name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vsuite-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  build_ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods || true

      - name: Install iOS Pods
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS (simulator)
        run: flutter build ios --debug --no-codesign --simulator

      - name: Zip iOS app
        run: |
          cd build/ios/Debug-iphonesimulator
          zip -r ../../../../vsuite-ios-debug.zip Runner.app

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: vsuite-ios-debug
          path: vsuite-ios-debug.zip
          retention-days: 30
