name: vsuite
description: VIMS VSuite Mobile — Chairman Approval Dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  fluttertoast: ^8.2.4
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo1.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.jpg
    - assets/images/logo1.jpg
    - assets/images/vmrfdu.jpg
    - assets/images/icon.jpg
